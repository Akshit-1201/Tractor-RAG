<svg viewBox="0 0 1480 1300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrAmber" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#D97706"/>
    </marker>
    <marker id="arrSky" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#0284C7"/>
    </marker>
    <marker id="arrGray" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#059669"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1480" height="1300" fill="#FFFFFF"/>

  <!-- ===================== HEADER ===================== -->
  <text x="40" y="46" font-size="24" font-weight="700" fill="#0F172A">Tractor Maintenance Assistant — System Architecture</text>
  <text x="40" y="74" font-size="13.5" fill="#64748B">RAG pipeline · role-separated frontends · cost-optimized image handling. Every choice maps to the three evaluation criteria: Role Separation · Accuracy · Speed &amp; Cost.</text>

  <!-- Legend -->
  <rect x="1086" y="20" width="354" height="86" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="1104" y="41" font-size="11.5" font-weight="700" fill="#334155" letter-spacing="0.5">LEGEND</text>
  <line x1="1104" y1="58" x2="1134" y2="58" stroke="#D97706" stroke-width="3"/>
  <text x="1142" y="62" font-size="11.5" fill="#475569">Ingestion path — runs once, at admin upload</text>
  <line x1="1104" y1="78" x2="1134" y2="78" stroke="#0284C7" stroke-width="3"/>
  <text x="1142" y="82" font-size="11.5" fill="#475569">Query path — the customer hot path</text>
  <line x1="1104" y1="98" x2="1134" y2="98" stroke="#94A3B8" stroke-width="3" stroke-dasharray="4 3"/>
  <text x="1142" y="102" font-size="11.5" fill="#475569">Store read / write</text>

  <!-- ===================== ROLE DIVIDER ===================== -->
  <line x1="500" y1="150" x2="500" y2="372" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="500" y="140" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">ROLE BOUNDARY</text>

  <!-- ===================== CLIENTS ===================== -->
  <!-- Admin -->
  <rect x="60" y="152" width="380" height="92" rx="12" fill="#1E293B" filter="url(#shadow)"/>
  <text x="80" y="184" font-size="15" font-weight="700" fill="#FFFFFF">ADMIN DASHBOARD</text>
  <text x="80" y="207" font-size="12" fill="#CBD5E1">Login · Upload docs &amp; images · View analytics</text>
  <rect x="80" y="217" width="130" height="20" rx="10" fill="#78350F"/>
  <text x="145" y="231" font-size="10.5" font-weight="600" fill="#FCD34D" text-anchor="middle">auth-gated (JWT)</text>
  <text x="300" y="230" font-size="10.5" fill="#64748B">React + Vite</text>

  <!-- Customer -->
  <rect x="560" y="152" width="380" height="92" rx="12" fill="#0F172A" filter="url(#shadow)"/>
  <text x="580" y="184" font-size="15" font-weight="700" fill="#FFFFFF">CUSTOMER CHAT</text>
  <text x="580" y="207" font-size="12" fill="#CBD5E1">Public · Plain-text questions · Streaming replies</text>
  <rect x="580" y="217" width="150" height="20" rx="10" fill="#0C4A6E"/>
  <text x="655" y="231" font-size="10.5" font-weight="600" fill="#7DD3FC" text-anchor="middle">no login · text only</text>
  <text x="800" y="230" font-size="10.5" fill="#64748B">React + Vite</text>

  <!-- ===================== API LAYER ===================== -->
  <rect x="60" y="280" width="380" height="88" rx="10" fill="#F1F5F9" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="80" y="306" font-size="13" font-weight="700" fill="#334155">FastAPI  ·  /admin/* routers</text>
  <text x="80" y="327" font-size="11" fill="#475569">JWT dependency guards every admin route</text>
  <text x="80" y="347" font-size="11" fill="#64748B">POST /documents · /images · GET /analytics</text>

  <rect x="560" y="280" width="380" height="88" rx="10" fill="#F1F5F9" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="580" y="306" font-size="13" font-weight="700" fill="#334155">FastAPI  ·  POST /chat  (public)</text>
  <text x="580" y="327" font-size="11" fill="#475569">No auth by design — open troubleshooting endpoint</text>
  <text x="580" y="347" font-size="11" fill="#64748B">Streams grounded answers back via SSE</text>

  <!-- path banners -->
  <rect x="60" y="388" width="380" height="0" fill="none"/>

  <!-- ===================== INGESTION COLUMN (amber) ===================== -->
  <!-- banner -->
  <rect x="60" y="384" width="200" height="20" rx="10" fill="#FEF3C7"/>
  <text x="160" y="398" font-size="10.5" font-weight="700" fill="#B45309" text-anchor="middle">UPLOAD PATH · runs rarely</text>

  <!-- I1 -->
  <rect x="60" y="412" width="380" height="132" rx="10" fill="#FEF6E7" stroke="#F59E0B" filter="url(#shadow)"/>
  <text x="80" y="437" font-size="13.5" font-weight="700" fill="#B45309">① Ingestion Service</text>
  <rect x="78" y="450" width="344" height="34" rx="7" fill="#FFFFFF" stroke="#FCD34D"/>
  <text x="92" y="471" font-size="11.5" fill="#334155">PDF → parse + chunk  ·  PyMuPDF</text>
  <rect x="78" y="490" width="344" height="42" rx="7" fill="#FFFFFF" stroke="#FCD34D"/>
  <text x="92" y="509" font-size="11.5" fill="#334155">Image → Vision describes → text description</text>
  <rect x="330" y="496" width="80" height="18" rx="9" fill="#D97706"/>
  <text x="370" y="509" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">×1 per image</text>
  <text x="92" y="525" font-size="10" fill="#B45309">structured fields: colour · symbol · blink · meaning</text>

  <!-- I2 -->
  <rect x="60" y="566" width="380" height="72" rx="10" fill="#FEF6E7" stroke="#F59E0B" filter="url(#shadow)"/>
  <text x="80" y="592" font-size="13" font-weight="700" fill="#B45309">② Embed chunks &amp; descriptions</text>
  <text x="80" y="614" font-size="11" fill="#475569">text-embedding-3-small → vectors (one unified index)</text>

  <!-- I3 -->
  <rect x="60" y="660" width="380" height="72" rx="10" fill="#FEF6E7" stroke="#F59E0B" filter="url(#shadow)"/>
  <text x="80" y="686" font-size="13" font-weight="700" fill="#B45309">③ Upsert to store</text>
  <text x="80" y="708" font-size="11" fill="#475569">vectors + Postgres full-text + metadata (image_url, type)</text>

  <!-- ===================== QUERY COLUMN (sky) ===================== -->
  <rect x="560" y="384" width="230" height="20" rx="10" fill="#E0F2FE"/>
  <text x="675" y="398" font-size="10.5" font-weight="700" fill="#0369A1" text-anchor="middle">HOT PATH · no vision inference</text>

  <!-- Q1 -->
  <rect x="560" y="412" width="380" height="66" rx="10" fill="#E8F5FD" stroke="#0EA5E9" filter="url(#shadow)"/>
  <text x="580" y="438" font-size="13" font-weight="700" fill="#0369A1">① Embed question</text>
  <text x="580" y="459" font-size="11" fill="#475569">text-embedding-3-small</text>

  <!-- Q2 -->
  <rect x="560" y="500" width="380" height="74" rx="10" fill="#E8F5FD" stroke="#0EA5E9" filter="url(#shadow)"/>
  <text x="580" y="526" font-size="13" font-weight="700" fill="#0369A1">② Hybrid retrieval</text>
  <text x="580" y="547" font-size="11" fill="#475569">dense (pgvector)  +  lexical (Postgres full-text)</text>
  <rect x="580" y="553" width="240" height="16" rx="8" fill="#BAE6FD"/>
  <text x="587" y="565" font-size="9.5" font-weight="600" fill="#0369A1">full-text nails part #s · error codes (E-047)</text>

  <!-- Q3 -->
  <rect x="560" y="596" width="380" height="118" rx="10" fill="#E8F5FD" stroke="#0EA5E9" filter="url(#shadow)"/>
  <text x="580" y="622" font-size="13" font-weight="700" fill="#0369A1">③ Chat LLM · GPT-4o-mini</text>
  <text x="580" y="645" font-size="11" fill="#334155">•  answer only from retrieved context</text>
  <text x="580" y="665" font-size="11" fill="#334155">•  cite the chunk IDs actually used  ← powers Option A</text>
  <text x="580" y="685" font-size="11" fill="#334155">•  no support in context → “I don’t know”</text>
  <text x="580" y="705" font-size="10" fill="#0369A1">grounding + citations = the accuracy criterion, made visible</text>

  <!-- Q4 -->
  <rect x="560" y="736" width="380" height="120" rx="10" fill="#E8F5FD" stroke="#0EA5E9" filter="url(#shadow)"/>
  <text x="580" y="762" font-size="13" font-weight="700" fill="#0369A1">④ Image gate (Option A) + assemble</text>
  <text x="580" y="785" font-size="11" fill="#334155">attach an image ONLY if all hold:</text>
  <text x="596" y="804" font-size="11" fill="#334155">•  its chunk was cited by the LLM</text>
  <text x="596" y="822" font-size="11" fill="#334155">•  it cleared the confidence threshold</text>
  <text x="596" y="840" font-size="11" fill="#334155">•  the answer is not “I don’t know”</text>
  <text x="580" y="852" font-size="0" fill="#334155"> </text>

  <!-- return arrow: Q4 -> Customer -->
  <path d="M560,808 H528 V246 H620" fill="none" stroke="#0284C7" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrSky)"/>
  <text x="544" y="560" font-size="10" font-weight="600" fill="#0284C7" text-anchor="middle" transform="rotate(-90 544 560)">streamed answer + cited sources</text>

  <!-- ===================== STORE (violet) ===================== -->
  <rect x="150" y="928" width="770" height="120" rx="12" fill="#F1ECFB" stroke="#A78BFA" filter="url(#shadow)"/>
  <text x="170" y="956" font-size="14" font-weight="700" fill="#6D28D9">PostgreSQL + pgvector  —  single store</text>
  <rect x="170" y="968" width="170" height="30" rx="7" fill="#FFFFFF" stroke="#DDD6FE"/>
  <text x="255" y="987" font-size="10.5" fill="#4C1D95" text-anchor="middle">Admin credentials</text>
  <rect x="350" y="968" width="180" height="30" rx="7" fill="#FFFFFF" stroke="#DDD6FE"/>
  <text x="440" y="987" font-size="10.5" fill="#4C1D95" text-anchor="middle">File &amp; chunk metadata</text>
  <rect x="540" y="968" width="200" height="30" rx="7" fill="#FFFFFF" stroke="#DDD6FE"/>
  <text x="640" y="987" font-size="10.5" fill="#4C1D95" text-anchor="middle">Dense vectors + full-text index</text>
  <rect x="750" y="968" width="150" height="30" rx="7" fill="#FFFFFF" stroke="#DDD6FE"/>
  <text x="825" y="987" font-size="10.5" fill="#4C1D95" text-anchor="middle">Question / analytics log</text>
  <text x="170" y="1024" font-size="11" font-style="italic" fill="#7C3AED">One store ⇒ vectors, relational data &amp; keyword search co-located — analytics &amp; metadata come free.</text>

  <!-- store I/O arrows -->
  <!-- ingestion upsert down -->
  <path d="M250,732 V928" fill="none" stroke="#D97706" stroke-width="2.2" marker-end="url(#arrAmber)"/>
  <!-- query retrieval read (gray dashed, bidirectional feel) -->
  <path d="M560,537 H508 V912 H540" fill="none" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arrGray)"/>
  <text x="492" y="760" font-size="10" fill="#64748B" text-anchor="middle" transform="rotate(-90 492 760)">retrieval read + analytics write</text>
  <!-- admin analytics read (far-left margin) -->
  <path d="M150,985 H40 V208 H60" fill="none" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arrGray)"/>
  <text x="30" y="590" font-size="10" fill="#64748B" text-anchor="middle" transform="rotate(-90 30 590)">analytics read → dashboard</text>

  <!-- ===================== OPENAI (emerald) ===================== -->
  <rect x="1010" y="412" width="430" height="300" rx="12" fill="#E6F7F0" stroke="#10B981" filter="url(#shadow)"/>
  <text x="1030" y="440" font-size="14" font-weight="700" fill="#047857">OpenAI APIs</text>

  <rect x="1030" y="456" width="390" height="66" rx="9" fill="#FFFFFF" stroke="#A7F3D0"/>
  <text x="1046" y="480" font-size="12.5" font-weight="700" fill="#065F46">Vision — GPT-4o-mini</text>
  <text x="1046" y="500" font-size="10.5" fill="#475569">image → rich text description</text>
  <rect x="1330" y="466" width="76" height="18" rx="9" fill="#FEF3C7"/>
  <text x="1368" y="479" font-size="9.5" font-weight="700" fill="#B45309" text-anchor="middle">upload only</text>

  <rect x="1030" y="532" width="390" height="66" rx="9" fill="#FFFFFF" stroke="#A7F3D0"/>
  <text x="1046" y="556" font-size="12.5" font-weight="700" fill="#065F46">Embeddings — text-embedding-3-small</text>
  <text x="1046" y="576" font-size="10.5" fill="#475569">shared by ingestion &amp; queries</text>
  <rect x="1348" y="542" width="58" height="18" rx="9" fill="#E2E8F0"/>
  <text x="1377" y="555" font-size="9.5" font-weight="700" fill="#334155" text-anchor="middle">both</text>

  <rect x="1030" y="608" width="390" height="66" rx="9" fill="#FFFFFF" stroke="#A7F3D0"/>
  <text x="1046" y="632" font-size="12.5" font-weight="700" fill="#065F46">Chat — GPT-4o-mini</text>
  <text x="1046" y="652" font-size="10.5" fill="#475569">grounded answer + chunk-ID citations</text>
  <rect x="1344" y="618" width="62" height="18" rx="9" fill="#E0F2FE"/>
  <text x="1375" y="631" font-size="9.5" font-weight="700" fill="#0369A1" text-anchor="middle">query only</text>

  <text x="1030" y="698" font-size="10.5" font-style="italic" fill="#047857">Vision cost is paid once at upload — the query path never touches it.</text>

  <!-- OpenAI arrows -->
  <!-- I1 -> Vision : route along top to avoid crossing columns -->
  <path d="M440,470 H480 V352 H980 V489 H1030" fill="none" stroke="#059669" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrGreen)"/>
  <!-- Q1 -> Embeddings -->
  <path d="M940,445 H975 V565 H1030" fill="none" stroke="#059669" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrGreen)"/>
  <!-- Q3 -> Chat -->
  <path d="M940,655 H1030" fill="none" stroke="#059669" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrGreen)"/>
  <!-- I2 -> Embeddings (short tag instead of long crossing line) -->
  <text x="450" y="600" font-size="9.5" fill="#059669">↳ embeddings API</text>

  <!-- ===================== VERTICAL FLOW ARROWS ===================== -->
  <!-- ingestion column -->
  <path d="M250,244 V280" fill="none" stroke="#D97706" stroke-width="2.2" marker-end="url(#arrAmber)"/>
  <path d="M250,368 V412" fill="none" stroke="#D97706" stroke-width="2.2" marker-end="url(#arrAmber)"/>
  <path d="M250,544 V566" fill="none" stroke="#D97706" stroke-width="2.2" marker-end="url(#arrAmber)"/>
  <path d="M250,638 V660" fill="none" stroke="#D97706" stroke-width="2.2" marker-end="url(#arrAmber)"/>
  <!-- query column -->
  <path d="M750,244 V280" fill="none" stroke="#0284C7" stroke-width="2.2" marker-end="url(#arrSky)"/>
  <path d="M750,368 V412" fill="none" stroke="#0284C7" stroke-width="2.2" marker-end="url(#arrSky)"/>
  <path d="M750,478 V500" fill="none" stroke="#0284C7" stroke-width="2.2" marker-end="url(#arrSky)"/>
  <path d="M750,574 V596" fill="none" stroke="#0284C7" stroke-width="2.2" marker-end="url(#arrSky)"/>
  <path d="M750,714 V736" fill="none" stroke="#0284C7" stroke-width="2.2" marker-end="url(#arrSky)"/>

  <!-- ===================== DECISIONS BAND ===================== -->
  <text x="40" y="1096" font-size="15" font-weight="700" fill="#0F172A">Why it's built this way</text>
  <line x1="40" y1="1106" x2="1440" y2="1106" stroke="#E2E8F0"/>

  <!-- row 1 -->
  <g>
    <rect x="40" y="1120" width="450" height="72" rx="9" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="40" y="1120" width="6" height="72" rx="3" fill="#D97706"/>
    <text x="62" y="1144" font-size="12.5" font-weight="700" fill="#334155">Vision at upload, not per query</text>
    <text x="62" y="1163" font-size="10.5" fill="#64748B">Pay the multimodal cost once; thousands of queries</text>
    <text x="62" y="1178" font-size="10.5" fill="#64748B">reuse the stored text.  <tspan font-weight="700" fill="#B45309">[ COST ]</tspan></text>
  </g>
  <g>
    <rect x="515" y="1120" width="450" height="72" rx="9" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="515" y="1120" width="6" height="72" rx="3" fill="#0284C7"/>
    <text x="537" y="1144" font-size="12.5" font-weight="700" fill="#334155">Lean hot path + SSE streaming</text>
    <text x="537" y="1163" font-size="10.5" fill="#64748B">Each query = embed + hybrid search + one chat call;</text>
    <text x="537" y="1178" font-size="10.5" fill="#64748B">streaming makes it feel instant.  <tspan font-weight="700" fill="#0369A1">[ SPEED · COST ]</tspan></text>
  </g>
  <g>
    <rect x="990" y="1120" width="450" height="72" rx="9" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="990" y="1120" width="6" height="72" rx="3" fill="#0EA5E9"/>
    <text x="1012" y="1144" font-size="12.5" font-weight="700" fill="#334155">Citation-gated images (Option A)</text>
    <text x="1012" y="1163" font-size="10.5" fill="#64748B">Image shows only if the LLM used its chunk — kills</text>
    <text x="1012" y="1178" font-size="10.5" fill="#64748B">confident-but-wrong images.  <tspan font-weight="700" fill="#0369A1">[ ACCURACY ]</tspan></text>
  </g>

  <!-- row 2 -->
  <g>
    <rect x="40" y="1204" width="450" height="72" rx="9" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="40" y="1204" width="6" height="72" rx="3" fill="#D97706"/>
    <text x="62" y="1228" font-size="12.5" font-weight="700" fill="#334155">Hybrid now, rerank later</text>
    <text x="62" y="1247" font-size="10.5" fill="#64748B">Postgres full-text catches part #s &amp; error codes</text>
    <text x="62" y="1262" font-size="10.5" fill="#64748B">cheaply; a cross-encoder is deferred by design.  <tspan font-weight="700" fill="#B45309">[ COST ]</tspan></text>
  </g>
  <g>
    <rect x="515" y="1204" width="450" height="72" rx="9" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="515" y="1204" width="6" height="72" rx="3" fill="#6D28D9"/>
    <text x="537" y="1228" font-size="12.5" font-weight="700" fill="#334155">Single Postgres + pgvector</text>
    <text x="537" y="1247" font-size="10.5" fill="#64748B">Vectors, relational data &amp; keyword search in one</text>
    <text x="537" y="1262" font-size="10.5" fill="#64748B">store — no extra service.  <tspan font-weight="700" fill="#6D28D9">[ SIMPLICITY · COST ]</tspan></text>
  </g>
  <g>
    <rect x="990" y="1204" width="450" height="72" rx="9" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="990" y="1204" width="6" height="72" rx="3" fill="#0EA5E9"/>
    <text x="1012" y="1228" font-size="12.5" font-weight="700" fill="#334155">Grounded or silent</text>
    <text x="1012" y="1247" font-size="10.5" fill="#64748B">Answers cite their sources or say “I don’t know” —</text>
    <text x="1012" y="1262" font-size="10.5" fill="#64748B">never guess.  <tspan font-weight="700" fill="#0369A1">[ ACCURACY ]</tspan></text>
  </g>
</svg>
